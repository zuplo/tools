name: Release Skills

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release artifacts
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          ./scripts/build-release.sh "$RELEASE_URL"

      - name: Prepare release assets
        id: assets
        run: |
          # Flatten skill-md files for upload (rename to {name}-SKILL.md)
          for dir in dist/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            if [ -f "$dir/SKILL.md" ]; then
              cp "$dir/SKILL.md" "dist/${name}-SKILL.md"
            fi
          done

      - name: Create GitHub Release
        run: |
          # Collect all release files (tar.gz, SKILL.md, index.json)
          files=()
          for f in dist/*.tar.gz dist/*-SKILL.md dist/index.json; do
            [ -f "$f" ] && files+=("$f")
          done

          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "${files[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.INTEGRATIONS_APP_ID }}
          private-key: ${{ secrets.INTEGRATIONS_APP_PRIVATE_KEY }}
          owner: zuplo
          repositories: www

      - name: Trigger www sync
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'zuplo',
              repo: 'www',
              event_type: 'sync-agent-skills',
              client_payload: {
                tag: '${{ github.ref_name }}'
              }
            });
